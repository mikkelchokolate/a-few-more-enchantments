name: Publish to Modrinth

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          # Set MODRINTH_ID in GitHub → Settings → Variables → Actions
          modrinth-id: ${{ vars.MODRINTH_ID }}
          # Set MODRINTH_TOKEN in GitHub → Settings → Secrets → Actions
          # Generate at: https://modrinth.com/settings/account (Scopes: CREATE_VERSION)
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          files: build/libs/!(*-@(dev|sources|javadoc)).jar

          name: ${{ github.event.release.name }}
          version: ${{ github.event.release.tag_name }}
          changelog: ${{ github.event.release.body }}

          game-versions: |
            >=1.18.2 <=1.21.11
          loaders: fabric
          java: 17
